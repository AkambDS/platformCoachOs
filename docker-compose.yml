version: "3.9"

services:
  db:
    image: postgres:16-alpine
    platform: linux/arm64
    restart: unless-stopped
    environment:
      POSTGRES_DB: coachos
      POSTGRES_USER: coachos
      POSTGRES_PASSWORD: coachos_dev_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    platform: linux/arm64
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: coachos
      MINIO_ROOT_PASSWORD: coachos_minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mailpit:
    image: axllent/mailpit:latest
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── Runs migrate once, then stays healthy for other services to depend on ──
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py migrate --noinput
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: "no"   # Run once and exit

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app
    ports: ["8000:8000"]
    depends_on:
      db:      { condition: service_healthy }
      redis:   { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis:   { condition: service_healthy }

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config beat --scheduler django_celery_beat.schedulers:DatabaseScheduler --loglevel=info
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - ./backend:/app
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis:   { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports: ["5173:5173"]
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
