name: coachos
region: nyc

services:
  - name: backend
    source_dir: backend
    github:
      repo: AkambDS/platformCoachOs
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    run_command: "gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    routes:
      - path: /
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        value: CHANGE_ME
        type: SECRET
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".ondigitalocean.app"
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.REDIS_URL}

workers:
  - name: celery-worker
    source_dir: backend
    github:
      repo: AkambDS/platformCoachOs
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    run_command: celery -A config.celery worker --loglevel=info
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        value: CHANGE_ME
        type: SECRET
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.REDIS_URL}

static_sites:
  - name: frontend
    source_dir: frontend
    github:
      repo: AkambDS/platformCoachOs
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    environment_slug: node-js
    index_document: index.html
    error_document: index.html

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1

  - name: redis
    engine: REDIS
    version: "7"
    size: db-s-1vcpu-1gb
    num_nodes: 1
