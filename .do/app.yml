name: coachos
region: nyc
services:
  # ── Django Backend API ─────────────────────────────────────────────────────
  - name: backend
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    run_command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 60
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        value: CHANGE_ME
        type: SECRET
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".ondigitalocean.app,localhost"
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.REDIS_URL}
      - key: STRIPE_TEST_SECRET_KEY
        value: sk_test_CHANGE_ME
        type: SECRET
      - key: DJSTRIPE_WEBHOOK_SECRET
        value: whsec_CHANGE_ME
        type: SECRET
      - key: CORS_ALLOWED_ORIGINS
        value: https://coachos.ondigitalocean.app
    routes:
      - path: /api
      - path: /admin
      - path: /stripe
      - path: /accounts

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - name: celery-worker
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    run_command: celery -A config.celery worker --loglevel=info --concurrency=2
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        value: CHANGE_ME
        type: SECRET
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.REDIS_URL}

  # ── React Frontend ─────────────────────────────────────────────────────────
  - name: frontend
    source_dir: frontend
    build_command: npm ci && npm run build
    output_dir: dist
    instance_size_slug: apps-s-1vcpu-1gb
    environment_slug: node-js
    envs:
      - key: VITE_API_BASE_URL
        value: ""
    routes:
      - path: /

# ── Managed PostgreSQL ─────────────────────────────────────────────────────────
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1

  - name: redis
    engine: REDIS
    version: "7"
    size: db-s-1vcpu-1gb
    num_nodes: 1