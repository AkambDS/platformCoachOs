name: coachos
region: nyc

services:
  # ── Django Backend API ─────────────────────────────────────────────────────
  - name: backend
    source_dir: backend
    github:
      repo: AkambDS/platformCoachOs
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    run_command: >-
      sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        value: CHANGE_ME_generate_with_python_secrets
        type: SECRET
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".ondigitalocean.app,localhost"
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.REDIS_URL}
      - key: STRIPE_TEST_SECRET_KEY
        value: sk_test_CHANGE_ME
        type: SECRET
      - key: DJSTRIPE_WEBHOOK_SECRET
        value: whsec_CHANGE_ME
        type: SECRET

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - name: celery-worker
    source_dir: backend
    github:
      repo: AkambDS/platformCoachOs
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    run_command: celery -A config.celery worker --loglevel=info --concurrency=2
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        value: CHANGE_ME_generate_with_python_secrets
        type: SECRET
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.REDIS_URL}

# ── React Frontend ─────────────────────────────────────────────────────────────
static_sites:
  - name: frontend
    source_dir: frontend
    github:
      repo: AkambDS/platformCoachOs
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    environment_slug: node-js
    index_document: index.html
    error_document: index.html

# ── Ingress — backend routes only, frontend gets / automatically ───────────────
ingress:
  rules:
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /api
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /admin
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /stripe
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /accounts

# ── Managed Databases ──────────────────────────────────────────────────────────
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1

  - name: redis
    engine: REDIS
    version: "7"
    size: db-s-1vcpu-1gb
    num_nodes: 1
