version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file: ./backend/.env
    environment:
      POSTGRES_DB:       coachos
      POSTGRES_USER:     coachos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U coachos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on: [backend, redis]
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config.celery worker --loglevel=info --concurrency=2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on: [backend, redis]
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ""   # empty = same origin via nginx
    volumes:
      - frontdist:/app/dist

  nginx:
    image: nginx:1.25-alpine
    restart: always
    depends_on: [backend, frontend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/var/www/static:ro
      - mediafiles:/var/www/media:ro
      - frontdist:/var/www/frontend:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    environment:
      NGINX_HOST: ${DOMAIN:-localhost}

volumes:
  pgdata:
  redisdata:
  staticfiles:
  mediafiles:
  frontdist:
